<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Product Details</title>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">Shop</a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
      </nav>
      <div class="actions">
        <a class="cart-link" href="cart.html">Cart<span class="badge">0</span></a>
        <a class="login-link" href="login.html">Login</a>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="product-detail">
      <div class="product-media" id="product-media"></div>
      <div class="product-info">
        <h1 id="product-title">Product Name</h1>
        <p class="price" id="product-price">$0.00</p>
        <p id="product-description">Loading product...</p>
        <button class="btn btn-primary" id="product-add" type="button">Add to Cart</button>
      </div>
    </section>
  </main>
  <script src="assets/js/env.js"></script>
  <script type="module" src="assets/js/supabase-client.js"></script>
  <script src="assets/js/storage.js"></script>
  <script src="assets/js/cart.js"></script>
  <script src="assets/js/product-page.js"></script>
</body>
</html>
